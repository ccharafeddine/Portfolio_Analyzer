name: Release

# Push a version tag to build installers and publish a GitHub Release, e.g.:
#     git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}  # allow manual runs for testing

permissions:
  contents: write  # required to create the Release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: PortfolioAnalyzer-Setup.exe   # Inno Setup installer
          - os: macos-latest
            asset: PortfolioAnalyzer.dmg         # disk image with the .app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          python -c "import re,pathlib,sys; p=pathlib.Path('src/ui/__init__.py'); s=p.read_text(); s=re.sub(r'__version__ = \"[^\"]*\"', '__version__ = \"'+sys.argv[1]+'\"', s); p.write_text(s)" "$VER"
          echo "Set __version__ to $VER"

      - name: Build app (PyInstaller)
        run: pyinstaller packaging/PortfolioAnalyzer.spec --noconfirm

      - name: Build Windows installer (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          if ($ver -notmatch '^\d') { $ver = "0.0.0" }
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$ver packaging\installer.iss

      - name: Build macOS disk image (.dmg)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "Portfolio Analyzer" \
            -srcfolder "dist/Portfolio Analyzer.app" \
            -ov -format UDZO "PortfolioAnalyzer.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          draft: true
          generate_release_notes: true
