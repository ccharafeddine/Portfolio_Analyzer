name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      # Keep any Qt import headless on the CI runners.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt
          pip install pytest ruff

      - name: Lint (critical errors only)
        run: python -m ruff check --select=E9,F63,F7,F82 src main_desktop.py

      - name: Compile check
        run: python -m compileall -q src main_desktop.py

      - name: Run tests
        run: python -m pytest -q
