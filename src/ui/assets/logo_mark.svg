<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Scaled up about the center to fill the icon canvas (less padding). -->
  <g transform="translate(128 128) scale(1.42) translate(-128 -128)">
    <!-- 5-segment allocation ring: mixed cyan/purple, purples weighted to the
         right (opposite the purple center bar on the left) -->
    <g transform="rotate(-90 128 128)" fill="none" stroke-width="30">
      <circle cx="128" cy="128" r="66" stroke="#7C3AED" stroke-dasharray="106.3 308.4" stroke-dashoffset="0"/>
      <circle cx="128" cy="128" r="66" stroke="#A855F7" stroke-dasharray="91.1 323.6" stroke-dashoffset="-113.3"/>
      <circle cx="128" cy="128" r="66" stroke="#22D3EE" stroke-dasharray="75.9 338.8" stroke-dashoffset="-211.4"/>
      <circle cx="128" cy="128" r="66" stroke="#38BDF8" stroke-dasharray="60.8 353.9" stroke-dashoffset="-294.3"/>
      <circle cx="128" cy="128" r="66" stroke="#7C6BF0" stroke-dasharray="45.6 369.1" stroke-dashoffset="-362.1"/>
    </g>
    <!-- center ascending bars (purple -> cyan) -->
    <g>
      <rect x="95"  y="136" width="19" height="28" rx="4" fill="#A855F7" opacity="0.7"/>
      <rect x="119" y="120" width="19" height="44" rx="4" fill="#818CF8"/>
      <rect x="143" y="104" width="19" height="60" rx="4" fill="#22D3EE"/>
    </g>
  </g>
</svg>
